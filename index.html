<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>수능 수학 단원별 기출문제 뷰어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --text: #e8eaf2;
    --text-dim: #8890b0;
    --text-muted: #555a7a;
    --math1: #4fc3f7;
    --math2: #81c784;
    --calc: #ffb74d;
    --danger: #ef5350;
    --success: #66bb6a;
    --warning: #ffa726;
    --sidebar-w: 270px;
    --list-w: 220px;
    --toolbar-h: 52px;
    --panel-transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── 툴바 ── */
  #toolbar {
    height: var(--toolbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 10px;
    flex-shrink: 0;
    z-index: 100;
    overflow-x: auto;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    margin-right: 4px;
  }
  .tb-sep { width: 1px; height: 24px; background: var(--border); margin: 0 3px; flex-shrink:0; }

  .tb-btn {
    height: 32px;
    padding: 0 9px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tb-btn:hover { background: var(--border); }
  .tb-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn.on { background: rgba(79,142,247,0.2); border-color: var(--accent); color: var(--accent); }
  .tb-btn.danger { border-color: var(--danger); color: var(--danger); }
  .tb-btn.danger:hover { background: var(--danger); color: #fff; }
  .tb-btn.save-btn { border-color: var(--success); color: var(--success); }
  .tb-btn.save-btn:hover { background: var(--success); color: #fff; }
  .tb-btn.video-btn { border-color: var(--warning); color: var(--warning); }
  .tb-btn.video-btn:hover { background: var(--warning); color: #000; }
  .tb-btn.video-btn.disabled { border-color: var(--text-muted); color: var(--text-muted); cursor: not-allowed; opacity: 0.5; }
  .tb-btn.video-btn.disabled:hover { background: var(--surface2); color: var(--text-muted); }

  .color-swatch {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .color-swatch.selected { border-color: #fff; transform: scale(1.3); }

  #pen-size {
    width: 64px; height: 26px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 0 4px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  #zoom-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    min-width: 34px;
    text-align: center;
    flex-shrink: 0;
  }

  #nav-info {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── 메인 레이아웃 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── 패널 공통 (슬라이드 토글) ── */
  .slide-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: width var(--panel-transition), opacity var(--panel-transition);
  }
  .slide-panel.collapsed {
    width: 0 !important;
    opacity: 0;
    border-right: none;
    pointer-events: none;
  }

  /* ── 사이드바 (단원 트리) ── */
  #sidebar { width: var(--sidebar-w); }

  .sidebar-header {
    padding: 9px 12px 7px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  #tree {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  #tree::-webkit-scrollbar { width: 4px; }
  #tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .subject-node {
    padding: 7px 12px 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    white-space: nowrap;
  }
  .subject-node .badge {
    font-size: 9px; padding: 1px 6px;
    border-radius: 10px; font-weight: 600;
  }
  .math1 { color: var(--math1); }
  .math1 .badge { background: rgba(79,195,247,0.15); color: var(--math1); }
  .math2 { color: var(--math2); }
  .math2 .badge { background: rgba(129,199,132,0.15); color: var(--math2); }
  .calc  { color: var(--calc); }
  .calc  .badge { background: rgba(255,183,77,0.15); color: var(--calc); }

  .chapter-node {
    padding: 6px 12px 6px 22px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .chapter-node:hover { background: var(--surface2); color: var(--text); }
  .chapter-node.active { background: rgba(79,142,247,0.15); color: var(--accent); }
  .chapter-node .cnt {
    margin-left: auto;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    padding-left: 8px;
  }
  .subject-chapters { display: none; }
  .subject-chapters.open { display: block; }

  /* ── 문항 리스트 ── */
  #qlist-panel { width: var(--list-w); }

  .qlist-header {
    padding: 9px 12px 7px;
    font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #qlist {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  #qlist::-webkit-scrollbar { width: 4px; }
  #qlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .q-item {
    padding: 7px 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.1s, color 0.1s;
    border-left: 2px solid transparent;
    white-space: nowrap;
  }
  .q-item:hover { background: var(--surface2); color: var(--text); }
  .q-item.active { background: rgba(79,142,247,0.12); color: var(--accent); border-left-color: var(--accent); }
  .q-item .idx { color: var(--text-muted); font-size: 10px; min-width: 18px; }
  .q-item .has-note { color: var(--success); font-size: 10px; margin-left: auto; }
  .q-item .has-video { color: var(--warning); font-size: 10px; margin-left: 3px; }

  /* ── 뷰어 영역 ── */
  #viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
    min-width: 0;
  }

  #viewer-scroll {
    position: absolute;
    inset: 0;
    overflow: auto;
  }
  #viewer-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  #viewer-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  #viewer-scroll::-webkit-scrollbar-track { background: #f0f0f0; }

  #paper {
    position: relative;
    width: 860px;
    min-height: 100%;
    margin: 0 auto;
    background: #fff;
    transform-origin: top left;
  }

  #problem-img {
    display: block;
    width: 100%;
    user-select: none;
    pointer-events: none;
    border-bottom: 1.5px dashed #e0e0e0;
  }

  #extra-space {
    width: 100%;
    height: 600px;
    background: #fff;
  }

  #draw-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: all;
    touch-action: none;
    cursor: crosshair;
  }

  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #aaa;
    gap: 12px;
    background: #f8f8f8;
    pointer-events: none;
  }
  #empty-state .icon { font-size: 52px; opacity: 0.35; }
  #empty-state .msg { font-size: 15px; }

  /* ── 유튜브 모달 ── */
  #video-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #video-modal.show { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: min(90vw, 800px);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 0 4px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .modal-close:hover { color: #fff; }
  .modal-iframe-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  .modal-iframe-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* ── 토스트 메시지 ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 1100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #toast.show { opacity: 1; }

  /* 오버레이 (모바일) */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 199;
    display: none;
  }
  #overlay.show { display: block; }
</style>
</head>
<body>

<!-- 토스트 메시지 -->
<div id="toast"></div>

<!-- 유튜브 모달 -->
<div id="video-modal" onclick="if(event.target===this) closeVideo()">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modal-title">📺 해설 영상</span>
      <button class="modal-close" onclick="closeVideo()">✕</button>
    </div>
    <div class="modal-iframe-wrap">
      <iframe id="yt-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
</div>

<div id="overlay" onclick="closePanels()"></div>

<!-- 툴바 -->
<div id="toolbar">
  <div class="title">📐 수능 수학</div>

  <button class="tb-btn on" id="btn-sidebar" onclick="togglePanel('sidebar')" title="단원 목록">☰ 단원</button>
  <button class="tb-btn on" id="btn-qlist"   onclick="togglePanel('qlist-panel')" title="문항 목록">≡ 문항</button>

  <div class="tb-sep"></div>

  <!-- ★ 해설 영상 버튼 -->
  <button class="tb-btn video-btn disabled" id="btn-video" onclick="openVideo()" title="해설 영상 보기">▶ 해설 영상</button>

  <div class="tb-sep"></div>

  <button class="tb-btn active" id="btn-pen"    onclick="setTool('pen')">✏️ 펜</button>
  <button class="tb-btn"        id="btn-eraser" onclick="setTool('eraser')">🧹 지우개</button>
  <button class="tb-btn danger"                 onclick="clearCanvas()">🗑️ 삭제</button>

  <div class="tb-sep"></div>

  <div class="color-swatch selected" style="background:#ef5350" onclick="setColor('#ef5350')" title="빨강"></div>
  <div class="color-swatch" style="background:#ff7043" onclick="setColor('#ff7043')" title="주황"></div>
  <div class="color-swatch" style="background:#1565c0" onclick="setColor('#1565c0')" title="파랑"></div>
  <div class="color-swatch" style="background:#2e7d32" onclick="setColor('#2e7d32')" title="초록"></div>
  <div class="color-swatch" style="background:#000000" onclick="setColor('#000000')" title="검정"></div>
  <input type="range" id="pen-size" min="1" max="20" value="3" title="굵기" oninput="penSize=+this.value">

  <div class="tb-sep"></div>

  <button class="tb-btn" onclick="changeZoom(-0.15)">➖</button>
  <div id="zoom-label">100%</div>
  <button class="tb-btn" onclick="changeZoom(0.15)">➕</button>
  <button class="tb-btn" onclick="resetZoom()">맞춤</button>

  <div class="tb-sep"></div>

  <button class="tb-btn" onclick="navigate(-1)">◀</button>
  <button class="tb-btn" onclick="navigate(1)">▶</button>

  <div class="tb-sep"></div>

  <button class="tb-btn save-btn" onclick="saveWithDrawing()">💾 저장</button>

  <div id="nav-info">—</div>
</div>

<!-- 메인 -->
<div id="main">

  <div id="sidebar" class="slide-panel">
    <div class="sidebar-header">단원 목록</div>
    <div id="tree"></div>
  </div>

  <div id="qlist-panel" class="slide-panel">
    <div class="qlist-header" id="qlist-title">단원을 선택하세요</div>
    <div id="qlist"></div>
  </div>

  <div id="viewer">
    <div id="empty-state">
      <div class="icon">📖</div>
      <div class="msg">단원 → 문제를 선택하세요</div>
    </div>
    <div id="viewer-scroll">
      <div id="paper" style="display:none">
        <img id="problem-img" alt="문제" onload="onImgLoad()">
        <div id="extra-space"></div>
        <canvas id="draw-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// 데이터베이스
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
// 파일 경로 변환
// ══════════════════════════════════════════════════
function codeToPath(code) {
  const parts = code.split('-');
  const year  = parts[0];
  const num   = parseInt(parts[parts.length - 1]);
  const mid   = parts.slice(1, -1).join('-');

  let dir;
  if (mid === '수능') dir = `${year}년도_수능`;
  else if (mid.includes('6')) dir = `${year}년도_6월모의고사`;
  else dir = `${year}년도_9월모의고사`;

  const numStr   = String(num).padStart(2, '0');
  const calcPart = num >= 23 ? '_미적분' : '';
  return `크롭결과/${dir}/${dir}${calcPart}_${numStr}번.png`;
}

// ══════════════════════════════════════════════════
// 타임스탬프 데이터베이스 (로드 후 저장)
// ══════════════════════════════════════════════════
let tsDB = {}; // { "2026_수능": { "전체": { url, video_id, timestamps } } }

async function loadTimestamps() {
  try {
    const res = await fetch('./timestamps.json');
    if (!res.ok) throw new Error('timestamps.json not found');
    tsDB = await res.json();
    console.log('✅ 타임스탬프 DB 로드 완료:', Object.keys(tsDB).length, '개 시험');
  } catch (e) {
    console.warn('⚠️ timestamps.json 로드 실패:', e.message);
    tsDB = {};
  }
}

// 문제 코드 → { videoId, seconds } 또는 null
function resolveVideoTimestamp(code) {
  if (!tsDB || Object.keys(tsDB).length === 0) return null;

  const parts = code.split('-');
  // parts 예: ["2025", "6", "모의", "15"] 또는 ["2022", "수능", "1"] 또는 ["2023", "9", "모평", "27"]
  const year = parts[0];
  const num  = parseInt(parts[parts.length - 1]);
  const mid  = parts.slice(1, -1).join('-'); // "6-모의", "9-모평", "수능"

  // DB 키 변환
  let examKey = '';
  if (mid === '수능') examKey = `${year}_수능`;
  else if (mid.includes('6')) examKey = `${year}_6월`;
  else if (mid.includes('9')) examKey = `${year}_9월`;
  else return null;

  const exam = tsDB[examKey];
  if (!exam) return null;

  // 파트 결정
  // "전체"만 있는 시험: 2026_*, 2025_수능, 2024_9월, 2024_6월, 2023_*, 2022_*
  // "공통"/"선택" 분리: 2025_9월, 2025_6월, 2024_수능
  let part = '전체';
  if (exam['공통'] || exam['선택']) {
    // 분리된 시험
    part = (num >= 1 && num <= 22) ? '공통' : '선택';
  }

  const partData = exam[part];
  if (!partData || !partData.timestamps) return null;

  const seconds = partData.timestamps[String(num)];
  if (seconds === undefined || seconds === null) return null;

  return {
    videoId: partData.video_id,
    seconds: seconds,
    url: partData.url
  };
}

// 현재 문제에 해설 영상이 있는지
function hasVideo() {
  if (currentIdx < 0) return false;
  const code = currentQuestions[currentIdx];
  const info = resolveVideoTimestamp(code);
  return info !== null && info.seconds !== undefined;
}

// 버튼 상태 업데이트
function updateVideoButton() {
  const btn = document.getElementById('btn-video');
  if (currentIdx < 0 || !hasVideo()) {
    btn.classList.add('disabled');
    btn.title = '해설 영상 없음';
  } else {
    btn.classList.remove('disabled');
    btn.title = '해설 영상 보기';
  }
}

// 모달 열기
function openVideo() {
  if (currentIdx < 0) return;
  const code = currentQuestions[currentIdx];
  const info = resolveVideoTimestamp(code);

  if (!info || info.seconds === undefined) {
    showToast('⚠️ 이 문제는 연결된 해설 영상이 없습니다');
    return;
  }

  const ytUrl = `https://www.youtube.com/embed/${info.videoId}?start=${info.seconds}&autoplay=1&rel=0`;
  document.getElementById('yt-frame').src = ytUrl;
  document.getElementById('modal-title').textContent = `📺 ${code} 해설`;
  document.getElementById('video-modal').classList.add('show');
}

function closeVideo() {
  document.getElementById('video-modal').classList.remove('show');
  document.getElementById('yt-frame').src = ''; // 재생 중지
}

// 토스트 메시지
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════════
let currentQuestions = [];
let currentIdx = -1;
let zoom = 1;
let tool = 'pen';
let penColor = '#ef5350';
let penSize = 3;
let drawing = false;
let lastX = 0, lastY = 0;
const savedStrokes = {};

const panelState = { sidebar: true, 'qlist-panel': true };

// ══════════════════════════════════════════════════
// 패널 토글
// ══════════════════════════════════════════════════
function togglePanel(id) {
  panelState[id] = !panelState[id];
  const el = document.getElementById(id);
  el.classList.toggle('collapsed', !panelState[id]);
  const btnId = id === 'sidebar' ? 'btn-sidebar' : 'btn-qlist';
  document.getElementById(btnId).classList.toggle('on', panelState[id]);
}
function closePanels() {
  ['sidebar','qlist-panel'].forEach(id => {
    panelState[id] = false;
    document.getElementById(id).classList.add('collapsed');
  });
  document.getElementById('btn-sidebar').classList.remove('on');
  document.getElementById('btn-qlist').classList.remove('on');
  document.getElementById('overlay').classList.remove('show');
}

// ══════════════════════════════════════════════════
// 트리 렌더링
// ══════════════════════════════════════════════════
function buildTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  Object.entries(DB).forEach(([subject, data]) => {
    const totalQ = Object.values(data.chapters).reduce((s,a) => s+a.length, 0);
    const subEl = document.createElement('div');
    subEl.className = `subject-node ${data.color}`;
    subEl.innerHTML = `<span class="arrow">▾</span> ${subject} <span class="badge">${totalQ}</span>`;

    const chapList = document.createElement('div');
    chapList.className = 'subject-chapters open';

    Object.entries(data.chapters).forEach(([name, questions]) => {
      const chapEl = document.createElement('div');
      chapEl.className = 'chapter-node';
      chapEl.innerHTML = `${name}<span class="cnt">${questions.length}</span>`;
      chapEl.addEventListener('click', () => selectChapter(chapEl, name, questions));
      chapList.appendChild(chapEl);
    });

    subEl.addEventListener('click', () => {
      chapList.classList.toggle('open');
      subEl.querySelector('.arrow').textContent = chapList.classList.contains('open') ? '▾' : '▸';
    });

    tree.appendChild(subEl);
    tree.appendChild(chapList);
  });
}

// ══════════════════════════════════════════════════
// 단원 선택
// ══════════════════════════════════════════════════
let activeChapEl = null;
function selectChapter(el, name, questions) {
  if (activeChapEl) activeChapEl.classList.remove('active');
  activeChapEl = el;
  el.classList.add('active');

  const sorted = [...questions].sort((a, b) => {
    const parse = c => {
      const p = c.split('-');
      const y = parseInt(p[0]);
      const n = parseInt(p[p.length-1]);
      const m = p.slice(1,-1).join('');
      const t = m.includes('6') ? 1 : m.includes('9') ? 2 : 3;
      return [y, t, n];
    };
    const [ay,at,an] = parse(a), [by,bt,bn] = parse(b);
    return ay!==by ? ay-by : at!==bt ? at-bt : an-bn;
  });

  currentQuestions = sorted;
  document.getElementById('qlist-title').textContent = name;

  const qlist = document.getElementById('qlist');
  qlist.innerHTML = '';
  sorted.forEach((code, i) => {
    const item = document.createElement('div');
    item.className = 'q-item';
    item.id = `qi-${i}`;
    const note = savedStrokes[code] ? '<span class="has-note">✍</span>' : '';
    const vid = resolveVideoTimestamp(code) ? '<span class="has-video">▶</span>' : '';
    item.innerHTML = `<span class="idx">${i+1}</span>${code}${note}${vid}`;
    item.addEventListener('click', () => selectQuestion(i));
    qlist.appendChild(item);
  });
}

// ══════════════════════════════════════════════════
// 문제 선택
// ══════════════════════════════════════════════════
function selectQuestion(idx) {
  if (currentIdx >= 0) saveCurrentStroke();
  currentIdx = idx;
  const code = currentQuestions[idx];

  document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
  const qEl = document.getElementById(`qi-${idx}`);
  if (qEl) { qEl.classList.add('active'); qEl.scrollIntoView({block:'nearest'}); }

  const img   = document.getElementById('problem-img');
  const paper = document.getElementById('paper');
  const empty = document.getElementById('empty-state');

  img.src = codeToPath(code);
  paper.style.display = 'block';
  empty.style.display = 'none';

  updateNavInfo();
  updateVideoButton();
}

// ══════════════════════════════════════════════════
// 이미지 로드 완료 → 캔버스 세팅
// ══════════════════════════════════════════════════
function onImgLoad() {
  const img    = document.getElementById('problem-img');
  const extra  = document.getElementById('extra-space');
  const canvas = document.getElementById('draw-canvas');
  const paper  = document.getElementById('paper');

  const viewerW = document.getElementById('viewer').clientWidth;
  const paperW  = Math.max(860, viewerW - 40);
  paper.style.width = paperW + 'px';

  const imgH    = img.offsetHeight;
  const extraH  = 600;
  extra.style.height = extraH + 'px';

  canvas.width  = paperW;
  canvas.height = imgH + extraH;
  canvas.style.width  = paperW + 'px';
  canvas.style.height = (imgH + extraH) + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const code = currentQuestions[currentIdx];
  if (code && savedStrokes[code]) {
    const tmp = new Image();
    tmp.onload = () => ctx.drawImage(tmp, 0, 0);
    tmp.src = savedStrokes[code];
  }

  applyZoom();
}

// ══════════════════════════════════════════════════
// 내비게이션
// ══════════════════════════════════════════════════
function navigate(dir) {
  if (!currentQuestions.length) return;
  const next = currentIdx + dir;
  if (next < 0 || next >= currentQuestions.length) return;
  selectQuestion(next);
}
function updateNavInfo() {
  const el = document.getElementById('nav-info');
  el.textContent = currentIdx < 0 ? '—' : `${currentIdx+1} / ${currentQuestions.length}`;
}

// ══════════════════════════════════════════════════
// 줌
// ══════════════════════════════════════════════════
function changeZoom(delta) {
  zoom = Math.min(3, Math.max(0.3, +(zoom + delta).toFixed(2)));
  applyZoom();
}
function resetZoom() { zoom = 1; applyZoom(); }
function applyZoom() {
  const paper = document.getElementById('paper');
  paper.style.transform = `scale(${zoom})`;
  paper.style.transformOrigin = 'top left';
  const scroll = document.getElementById('viewer-scroll');
  scroll.style.height = '100%';
  document.getElementById('zoom-label').textContent = Math.round(zoom*100) + '%';
}

// ══════════════════════════════════════════════════
// 드로잉
// ══════════════════════════════════════════════════
function setTool(t) {
  tool = t;
  document.getElementById('btn-pen').classList.toggle('active', t==='pen');
  document.getElementById('btn-eraser').classList.toggle('active', t==='eraser');
}
function setColor(c) {
  penColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => {
    const bg = el.style.backgroundColor || el.style.background;
    el.classList.toggle('selected', bg === c || el.style.background === c);
  });
  if (tool !== 'pen') setTool('pen');
}

const canvas = document.getElementById('draw-canvas');
const ctx    = canvas.getContext('2d');

function getCanvasPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

function startDraw(e) {
  if (currentIdx < 0) return;
  e.preventDefault();
  drawing = true;
  const p = getCanvasPos(e);
  lastX = p.x; lastY = p.y;
}
function doDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getCanvasPos(e);
  ctx.beginPath();
  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = penSize * 5;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = penColor;
    ctx.lineWidth = penSize;
  }
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  lastX = p.x; lastY = p.y;
}
function endDraw() {
  drawing = false;
  ctx.globalCompositeOperation = 'source-over';
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  doDraw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove',  doDraw,    {passive:false});
canvas.addEventListener('touchend',   endDraw);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (currentIdx >= 0) delete savedStrokes[currentQuestions[currentIdx]];
  refreshQListNote();
}

function saveCurrentStroke() {
  const code = currentQuestions[currentIdx];
  if (!code) return;
  const blank = document.createElement('canvas');
  blank.width = canvas.width; blank.height = canvas.height;
  if (canvas.toDataURL() !== blank.toDataURL()) {
    savedStrokes[code] = canvas.toDataURL();
  } else {
    delete savedStrokes[code];
  }
  refreshQListNote();
}

function refreshQListNote() {
  document.querySelectorAll('.q-item').forEach((el, i) => {
    const code = currentQuestions[i];
    const noteSpan = el.querySelector('.has-note');
    if (savedStrokes[code] && !noteSpan) {
      el.insertAdjacentHTML('beforeend','<span class="has-note">✍</span>');
    } else if (!savedStrokes[code] && noteSpan) {
      noteSpan.remove();
    }
  });
}

// ══════════════════════════════════════════════════
// PNG 저장 (문제 + 필기 합치기)
// ══════════════════════════════════════════════════
function saveWithDrawing() {
  if (currentIdx < 0) return;
  const img = document.getElementById('problem-img');
  const out = document.createElement('canvas');
  out.width  = canvas.width;
  out.height = canvas.height;
  const oc = out.getContext('2d');
  oc.fillStyle = '#ffffff';
  oc.fillRect(0, 0, out.width, out.height);
  oc.drawImage(img, 0, 0, canvas.width, img.naturalHeight * (canvas.width / img.naturalWidth));
  oc.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = `${currentQuestions[currentIdx]}_풀이.png`;
  link.href = out.toDataURL('image/png');
  link.click();
}

// ══════════════════════════════════════════════════
// 키보드 단축키
// ══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  if (e.key === '+' || e.key === '=') changeZoom(0.15);
  if (e.key === '-') changeZoom(-0.15);
  if (e.key === '0') resetZoom();
  if (e.key === 'p') setTool('pen');
  if (e.key === 'e') setTool('eraser');
  if (e.key === 'v') openVideo(); // 'v' 키로 해설 영상 열기
});

// ══════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════
(async function init() {
  await loadTimestamps();
  buildTree();
  // 문항 리스트에 비디오 표시를 위해 다시 그릴 수 있지만, 최초에는 단원 선택 안 돼 있으므로 괜찮음
  // 단원 선택 시 selectChapter에서 resolveVideoTimestamp 호출
})();
</script>
